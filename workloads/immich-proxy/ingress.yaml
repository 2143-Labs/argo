apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-proxy
  namespace: default
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: images-2143-https
  hostnames:
    - images.2143.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: immich-proxy
          port: 80

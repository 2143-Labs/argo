apiVersion: v1
kind: Service
metadata:
  name: livekit-server-rtc
  namespace: matrix
  annotations:
    kube-vip.io/loadbalancerIPs: "192.168.5.10"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: livekit-server
  ports:
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
      protocol: TCP
    - name: rtc-udp
      port: 50000
      targetPort: 50000
      protocol: UDP

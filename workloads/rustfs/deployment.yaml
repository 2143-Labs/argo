apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  labels:
    app: rustfs
spec:
  revisionHistoryLimit: 3
  replicas: 0  # permanently disabled — PVC extracted, migration in progress
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:

      # Constrain to closet+nas (10G direct link) to avoid 280GB replica
      # traffic over slower inter-node links on every pod reschedule.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - closet
                      - nas
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rustfs-data
      containers:
        - name: rustfs
          image: rustfs/rustfs:1.0.0-alpha.90
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
          envFrom:
            - secretRef:
                name: rustfs-credentials
          env:
            - name: RUSTFS_ADDRESS
              value: "0.0.0.0:9000"
            - name: RUSTFS_CONSOLE_ADDRESS
              value: "0.0.0.0:9001"
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_SERVER_DOMAINS
              value: "files.john2143.com,rustfs"
            - name: RUSTFS_CORS_ALLOWED_ORIGINS
              value: "https://files-ui.john2143.com"
            - name: RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS
              value: "https://files-ui.john2143.com"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          resources:
            requests:
              cpu: 100m
              memory: 8Gi
            limits:
              cpu: 2000m
              memory: 24Gi
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data

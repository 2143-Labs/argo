apiVersion: apps/v1
kind: Deployment
metadata:
  name: heorot-voice-relay
  namespace: matrix
  labels:
    app.kubernetes.io/name: heorot-voice-relay
    app.kubernetes.io/instance: heorot-voice-relay
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: heorot-voice-relay
      app.kubernetes.io/instance: heorot-voice-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: heorot-voice-relay
        app.kubernetes.io/instance: heorot-voice-relay
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - general
      containers:
        - name: heorot-voice-relay
          image: ghcr.io/vitosicz/heorot-voice-relay:main
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          envFrom:
            - configMapRef:
                name: heorot-voice-relay
          env:
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heorot-voice-relay
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: heorot-voice-relay
                  key: LIVEKIT_API_SECRET
          livenessProbe:
            httpGet:
              path: /voice/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /voice/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mimir
  namespace: observability
spec:
  serviceName: mimir-headless
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:2.14.2
          args:
            - "-target=all"
            - "-config.file=/etc/mimir/mimir.yaml"
            - "-config.expand-env=true"
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: o11y-rustfs-buckets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: o11y-rustfs-buckets
                  key: S3_SECRET_KEY
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9095
              name: grpc
            - containerPort: 7946
              name: memberlist
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
            - name: storage
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: mimir-config
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 30Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: observability
data:
  mimir.yaml: |
    multitenancy_enabled: false
    target: all
    server:
      http_listen_port: 8080
      grpc_listen_port: 9095
    common:
      storage:
        backend: s3
        s3:
          endpoint: files.john2143.com
          access_key_id: "${S3_ACCESS_KEY}"
          secret_access_key: "${S3_SECRET_KEY}"
          insecure: false
    blocks_storage:
      s3:
        bucket_name: mimir-blocks
    ruler_storage:
      s3:
        bucket_name: mimir-rules
    alertmanager_storage:
      s3:
        bucket_name: mimir-alertmanager
    ingester:
      ring:
        replication_factor: 1
    limits:
      max_global_series_per_user: 500000
      compactor_blocks_retention_period: 720h
    memberlist:
      bind_port: 7946
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: observability
spec:
  selector:
    app: mimir
  ports:
    - name: http
      port: 8080
    - name: grpc
      port: 9095

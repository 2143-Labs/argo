apiVersion: batch/v1
kind: CronJob
metadata:
  name: observability-archive
  namespace: observability
spec:
  schedule: "0 3 1 * *"  # Monthly on the 1st at 3am
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: rclone
              image: rclone/rclone:latest
              args:
                - copy
                - s3:mimir-blocks
                - /archive/mimir/
                - --s3-endpoint=rustfs.default.svc:9000
                - --s3-access-key-id=$(S3_ACCESS_KEY)
                - --s3-secret-access-key=$(S3_SECRET_KEY)
                - --s3-provider=Minio
              env:
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: o11y-rustfs-buckets
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: o11y-rustfs-buckets
                      key: S3_SECRET_KEY
              volumeMounts:
                - name: archive
                  mountPath: /archive
          - name: rclone-loki
            image: rclone/rclone:latest
            args:
              - copy
              - s3:loki-chunks
              - /archive/loki/
              - --s3-endpoint=rustfs.default.svc:9000
              - --s3-access-key-id=$(S3_ACCESS_KEY)
              - --s3-secret-access-key=$(S3_SECRET_KEY)
              - --s3-provider=Minio
            env:
              - name: S3_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: o11y-rustfs-buckets
                    key: S3_ACCESS_KEY
              - name: S3_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: o11y-rustfs-buckets
                    key: S3_SECRET_KEY
            volumeMounts:
              - name: archive
                mountPath: /archive
          - name: rclone-tempo
            image: rclone/rclone:latest
            args:
              - copy
              - s3:tempo-blocks
              - /archive/tempo/
              - --s3-endpoint=rustfs.default.svc:9000
              - --s3-access-key-id=$(S3_ACCESS_KEY)
              - --s3-secret-access-key=$(S3_SECRET_KEY)
              - --s3-provider=Minio
            env:
              - name: S3_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: o11y-rustfs-buckets
                    key: S3_ACCESS_KEY
              - name: S3_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: o11y-rustfs-buckets
                    key: S3_SECRET_KEY
            volumeMounts:
              - name: archive
                mountPath: /archive
          volumes:
            - name: archive
              nfs:
                server: nas.local
                path: /tank/logs
          restartPolicy: OnFailure

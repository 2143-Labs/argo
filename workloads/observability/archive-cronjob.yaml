apiVersion: batch/v1
kind: CronJob
metadata:
  name: observability-archive
  namespace: observability
spec:
  schedule: "0 3 1 * *"  # Monthly on the 1st at 3am
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: rclone
              image: rclone/rclone:latest
              args:
                - "copy"
                - "s3:mimir-blocks"
                - "/archive/mimir/"
                - "--s3-endpoint=rustfs.default.svc:9000"
                - "--s3-access-key-id=$(RUSTFS_ACCESS_KEY)"
                - "--s3-secret-access-key=$(RUSTFS_SECRET_KEY)"
                - "--s3-provider=Minio"
              env:
                - name: RUSTFS_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: rustfs-credentials
                      key: RUSTFS_ROOT_USER
                - name: RUSTFS_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: rustfs-credentials
                      key: RUSTFS_ROOT_PASSWORD
              volumeMounts:
                - name: archive
                  mountPath: /archive
              # Run each bucket copy as a separate container in the same pod
              # to simplify: one container per bucket.
          - name: rclone-loki
            image: rclone/rclone:latest
            args:
              - "copy"
              - "s3:loki-chunks"
              - "/archive/loki/"
              - "--s3-endpoint=rustfs.default.svc:9000"
              - "--s3-access-key-id=$(RUSTFS_ACCESS_KEY)"
              - "--s3-secret-access-key=$(RUSTFS_SECRET_KEY)"
              - "--s3-provider=Minio"
            env:
              - name: RUSTFS_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: rustfs-credentials
                    key: RUSTFS_ROOT_USER
              - name: RUSTFS_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: rustfs-credentials
                    key: RUSTFS_ROOT_PASSWORD
            volumeMounts:
              - name: archive
                mountPath: /archive
          - name: rclone-tempo
            image: rclone/rclone:latest
            args:
              - "copy"
              - "s3:tempo-blocks"
              - "/archive/tempo/"
              - "--s3-endpoint=rustfs.default.svc:9000"
              - "--s3-access-key-id=$(RUSTFS_ACCESS_KEY)"
              - "--s3-secret-access-key=$(RUSTFS_SECRET_KEY)"
              - "--s3-provider=Minio"
            env:
              - name: RUSTFS_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: rustfs-credentials
                    key: RUSTFS_ROOT_USER
              - name: RUSTFS_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: rustfs-credentials
                    key: RUSTFS_ROOT_PASSWORD
            volumeMounts:
              - name: archive
                mountPath: /archive
          volumes:
            - name: archive
              nfs:
                server: nas.local
                path: /tank/logs
          restartPolicy: OnFailure

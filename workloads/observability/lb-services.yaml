apiVersion: v1
kind: Service
metadata:
  name: mimir-lb
  namespace: observability
  annotations:
    kube-vip.io/loadbalancerIPs: "192.168.5.11"
spec:
  type: LoadBalancer
  loadBalancerClass: kube-vip.io/kube-vip-class
  selector:
    app: mimir
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: loki-push-lb
  namespace: observability
  annotations:
    kube-vip.io/loadbalancerIPs: "192.168.5.12"
spec:
  type: LoadBalancer
  loadBalancerClass: kube-vip.io/kube-vip-class
  selector:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: loki
  ports:
    - name: http
      port: 3100
      targetPort: 8080

apiVersion: v1
kind: Service
metadata:
  name: mimir-lb
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app: mimir
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: loki-push-lb
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: loki
  ports:
    - name: http
      port: 3100
      targetPort: 8080

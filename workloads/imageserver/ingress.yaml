apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: john2143-com
  namespace: default
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: john2143-https
  hostnames:
    - john2143.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: john2143-com
          port: 80

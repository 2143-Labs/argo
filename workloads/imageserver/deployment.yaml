apiVersion: apps/v1
kind: Deployment
metadata:
  name: john2143-com
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: john2143-com
  template:
    metadata:
      labels:
        app: john2143-com
        servicegroup: "mine"
    spec:
      volumes:
      - name: data-volume
        emptyDir:
          sizeLimit: 20Gi
      - name: upload-fish
        configMap:
          name: upload-fish
          defaultMode: 0555
          items:
            - key: upload.fish
              path: upload.fish
            - key: prune.fish
              path: prune.fish
            - key: shared.fish
              path: shared.fish

      containers:
      - name: john2143-com
        image: ghcr.io/john2143/john2143.com:183
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: &port 3000
        volumeMounts:
        - mountPath: /app/juushFiles
          name: data-volume
        - mountPath: /app/upload-fish
          name: upload-fish
          readOnly: true
        env:
        - name: DB
          valueFrom:
            secretKeyRef:
              name: mongo-creds
              key: worker-uri
        - name: PORT
          value: "3000"
        - name: IP
          value: "0.0.0.0"
        - name: NODE_ENV
          value: production
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - name: S3_ENDPOINT_URL
          value: "https://files.john2143.com"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-s3-creds
              key: accessKey
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-s3-creds
              key: secretKey
        - name: MINIO_ENDPOINT_URL
          valueFrom:
            secretKeyRef:
              name: minio-creds
              key: S3_ENDPOINT_URL
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-creds
              key: S3_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-creds
              key: S3_SECRET_KEY
        - name: BUCKET
          value: "imagehost-files"
        - name: FOLDER
          value: "public-prod"
        - name: AUTH_CALLBACK_BASE
          value: "https://2143.me"
        - name: POCKETID_ISSUER
          value: "https://au.2143.me"
        - name: POCKETID_ADMIN_GROUP
          value: "admin"
        - name: POCKETID_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: POCKETID_CLIENT_ID
        - name: POCKETID_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: POCKETID_CLIENT_SECRET
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: DISCORD_CLIENT_ID
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: DISCORD_CLIENT_SECRET
        - name: DISCORD_ADMIN_IDS
          value: ""

        resources:
          requests:
            memory: "100Mi"
            cpu: "10m"
          limits:
            memory: "200Mi"
            cpu: "100m"

        livenessProbe:
          httpGet:
            path: /health
            port: *port
          initialDelaySeconds: 1
          periodSeconds: 1
          failureThreshold: 25

        readinessProbe:
          httpGet:
            path: /health
            port: *port
          initialDelaySeconds: 1
          periodSeconds: 5
          failureThreshold: 3

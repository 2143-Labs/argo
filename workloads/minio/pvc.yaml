apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  labels:
    app: minio
  annotations:
    # Keep volume data if this manifest is removed from the repo; avoids accidental Argo prune.
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500G
  storageClassName: local-path

apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  labels:
    app: mosquitto
data:
  mosquitto.conf: |
    # MQTT listener (standard)
    listener 1883
    protocol mqtt

    # Authentication
    allow_anonymous false
    password_file /mosquitto/config/password.txt

    # Persistence for retained messages and session state
    persistence true
    persistence_location /mosquitto/data/

    # Logging
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information
    connection_messages true

    # Performance
    max_queued_messages 1000
    message_size_limit 0

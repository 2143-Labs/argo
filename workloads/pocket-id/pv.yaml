apiVersion: v1
kind: PersistentVolume
metadata:
  name: pocket-id-restored-pv
  labels:
    longhorn-volume: pocket-id-restored
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeHandle: pocket-id-restored

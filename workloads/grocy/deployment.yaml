apiVersion: apps/v1
kind: Deployment
metadata:
  name: grocy
  labels:
    app: grocy
spec:
  replicas: 1
  strategy:
    # Recreate: required for SQLite (ReadWriteOnce PVC — cannot have two pods)
    type: Recreate
  selector:
    matchLabels:
      app: grocy
  template:
    metadata:
      labels:
        app: grocy
    spec:
      containers:
        - name: grocy
          image: docker.io/linuxserver/grocy:latest
          env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: GROCY_CULTURE
              value: en
            - name: GROCY_TIMEZONE
              value: America/Chicago
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          volumeMounts:
            - name: grocy-config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: grocy-config
          persistentVolumeClaim:
            claimName: grocy-config-lh

apiVersion: v1
kind: Service
metadata:
  name: teamspeak
  labels:
    app: teamspeak
spec:
  type: ClusterIP
  selector:
    app: teamspeak
  ports:
    - port: 9987
      targetPort: 9987
      protocol: UDP
      name: voice
    - port: 30033
      targetPort: 30033
      protocol: TCP
      name: file-transfer

apiVersion: v1
kind: Service
metadata:
  name: teamspeak
  labels:
    app: teamspeak
spec:
  type: ClusterIP
  selector:
    app: teamspeak
  ports:
    - port: 9987
      targetPort: 9987
      protocol: UDP
      name: voice
    - port: 30033
      targetPort: 30033
      protocol: TCP
      name: file-transfer

apiVersion: v1
kind: Service
metadata:
  name: teamspeak-np
  labels:
    app: teamspeak-np
spec:
  type: NodePort
  selector:
    app: teamspeak
  ports:
    # nodeports: same port +1
    - port: 9988
      targetPort: 9987
      protocol: UDP
      name: voice-nodeport
    - port: 30034
      targetPort: 30033
      protocol: TCP
      name: file-transfer-nodeport


# docker pull ghcr.io/2143-labs/bevy2025:teamspeak-wasm-latest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teamspeak
  labels:
    app: teamspeak
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: teamspeak
  template:
    metadata:
      labels:
        app: teamspeak
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - closet
      volumes:
      - name: ts-all
        persistentVolumeClaim:
          claimName: teamspeak-all-lh
      containers:
        - name: teamspeak
          image: docker.io/teamspeak:3.13.7
          #securityContext:
            #allowPrivilegeEscalation: false
            #capabilities:
              #drop: ["ALL"]
          env:
          - name: TS3SERVER_LICENSE
            value: accept
          ports:
            - containerPort: 9987
              protocol: UDP
              name: voice
            - containerPort: 30033
              name: file-transfer
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 500m
              memory: 500Mi
          volumeMounts:
          - mountPath: /var/ts3server/
            name: ts-all

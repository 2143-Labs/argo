apiVersion: v1
kind: Service
metadata:
  name: matter-server
  labels:
    app: matter-server
spec:
  type: ClusterIP
  selector:
    app: matter-server
  ports:
    - port: 5580
      targetPort: 5580
      protocol: TCP
      name: ws
---
apiVersion: v1
kind: Service
metadata:
  name: matter-server-nodeport
  labels:
    app: matter-server
spec:
  type: NodePort
  selector:
    app: matter-server
  ports:
    - port: 5580
      nodePort: 30167
      targetPort: 5580
      protocol: TCP
      name: ws

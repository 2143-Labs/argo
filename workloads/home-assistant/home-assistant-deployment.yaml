apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable
          #securityContext:
            #runAsUser: 0
            #allowPrivilegeEscalation: false
          ports:
            - containerPort: 8123
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ttyusb0
              mountPath: /dev/ttyUSB0
            #- name: ttyusb1
              #mountPath: /dev/ttyUSB1
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 1500m
              memory: 4Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: ttyusb0
          hostPath:
            path: /dev/ttyUSB0
            type: CharDevice
        #- name: ttyusb1
          #hostPath:
            #path: /dev/ttyUSB1
            #type: CharDevice

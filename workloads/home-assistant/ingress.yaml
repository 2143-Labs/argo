apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant
  namespace: default
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: home-john2143-https
  hostnames:
    - home.john2143.com
    - home.ts.2143.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: home-assistant
          port: 80

# kube-vip DaemonSet — ARP-based VIP on the LAN bridge for k8s service ingress.
#
# Runs on all 3 control-plane nodes (closet, arch, nas). Uses leader election
# so only one node holds the VIP at a time. On failover, the new leader sends
# a gratuitous ARP to claim 192.168.5.10.
#
# kube-vip v0.8.9+ uses CLI flags, not environment variables.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  name: kube-vip
  namespace: kube-system
  labels:
    app: kube-vip
spec:
  selector:
    matchLabels:
      app: kube-vip
  template:
    metadata:
      labels:
        app: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.9
          imagePullPolicy: IfNotPresent
          args:
            - manager
            - --arp
            - --address=192.168.5.10
            - --leaderElection
            - --inCluster
            - --leaseNamespace=kube-system
            - --leaseName=kube-vip
            # Interface auto-detected from default route.
            # If this fails, add: --interface=enpXs0
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_TIME
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

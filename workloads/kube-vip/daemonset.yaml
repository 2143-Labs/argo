# kube-vip DaemonSet — ARP-based VIP on the LAN bridge for k8s service ingress.
#
# Runs on all 3 control-plane nodes (closet, arch, nas). Uses leader election
# so only one node holds the VIP at a time. On failover, the new leader sends
# a gratuitous ARP to claim 192.168.5.10.
#
# This VIP is the single A record target for all *.ts.2143.me headscale DNS
# entries. Tailscale subnet routes (192.168.5.0/24 on each gateway node) let
# tailnet clients reach the VIP.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  name: kube-vip
  namespace: kube-system
  labels:
    app: kube-vip
spec:
  selector:
    matchLabels:
      app: kube-vip
  template:
    metadata:
      labels:
        app: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.9
          imagePullPolicy: IfNotPresent
          args:
            - manager
          env:
            - name: vip_arp
              value: "true"
            - name: address
              value: "192.168.5.10"
            - name: vip_leaderelection
              value: "true"
            - name: lease_name
              value: "kube-vip"
            - name: lease_namespace
              value: "kube-system"
            # Interface auto-detected from default route. If this fails on
            # a node with unusual routing, set vip_interface explicitly:
            # - name: vip_interface
            #   value: "enpXs0"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_TIME
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

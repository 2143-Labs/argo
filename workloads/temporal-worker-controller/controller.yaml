# Source: temporal-worker-controller/templates/manager.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twc-manager
  namespace: temporal-system
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/name: temporal-worker-controller
    app.kubernetes.io/instance: twc
    app.kubernetes.io/version: "1.8.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-worker-controller
      app.kubernetes.io/instance: twc
  replicas: 2
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/component: manager
        app.kubernetes.io/name: temporal-worker-controller
        app.kubernetes.io/instance: twc
        app.kubernetes.io/version: "1.8.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:

                    app.kubernetes.io/name: temporal-worker-controller
                    app.kubernetes.io/instance: twc
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
      containers:
      - name: manager
        image: "temporalio/temporal-worker-controller:v1.8.0"
        imagePullPolicy: IfNotPresent
        env:
        - name: CONTROLLER_IDENTITY
          value: "twc/temporal-system"
        - name: CONTROLLER_VERSION
          value: "1.8.0"
        # POD_NAMESPACE and SERVICE_ACCOUNT_NAME are populated automatically by
        # Kubernetes from the pod's own metadata (namespace and service account name).
        # The validating webhook reads them to perform SubjectAccessReview checks
        # using the controller's identity.
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_ACCOUNT_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        # ALLOWED_KINDS controls which resource kinds are accepted by the
        # WorkerResourceTemplate validating webhook. Derived from
        # workerResourceTemplate.allowedResources[*].kinds in values.yaml.
        # An empty value rejects all kinds — at least one must be configured.
        - name: ALLOWED_KINDS
          value: "HorizontalPodAutoscaler,ScaledObject"
        args:
        - --leader-elect
        - "--metrics-bind-address=127.0.0.1:8080"
        - "--health-probe-bind-address=:8081"
        ports:
          - containerPort: 9443
            name: webhook-server
            protocol: TCP
        volumeMounts:
          - mountPath: /tmp/k8s-webhook-server/serving-certs
            name: cert
            readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      - name: kube-rbac-proxy
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - "ALL"
        image: registry.k8s.io/kubebuilder/kube-rbac-proxy:v0.14.1
        args:
          - "--secure-listen-address=0.0.0.0:8443"
          - --upstream=http://127.0.0.1:8080/
          - "--logtostderr=true"
          - "--v=0"
        ports:
          - containerPort: 8443
            protocol: TCP
            name: https
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 64Mi
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: webhook-server-cert
      serviceAccountName: twc-service-account
      terminationGracePeriodSeconds: 10

---
# Source: temporal-worker-controller/templates/webhook.yaml
# ValidatingWebhookConfiguration for WorkerResourceTemplate.
# Always installed — this webhook is a required security control that validates
# all WorkerResourceTemplate create/update/delete requests.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: twc-wrt-validating-webhook-configuration
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: temporal-worker-controller
    app.kubernetes.io/instance: twc
    app.kubernetes.io/version: "1.8.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    # cert-manager injects the CA bundle from the named Certificate into this field automatically.
    cert-manager.io/inject-ca-from: temporal-system/twc-serving-cert
webhooks:
  - name: vworkerresourcetemplate.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: twc-webhook-service
        namespace: temporal-system
        path: /validate-temporal-io-v1alpha1-workerresourcetemplate
    failurePolicy: Fail
    rules:
      - apiGroups: ["temporal.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["workerresourcetemplates"]
    sideEffects: None


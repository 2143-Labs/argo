apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  storage:
    size: 5Gi
    storageClass: longhorn-cnpg
  walStorage:
    size: 2Gi
    storageClass: longhorn-cnpg
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      postInitSQL:
        - CREATE DATABASE temporal_visibility OWNER temporal
  managed:
    roles:
      - name: temporal
        ensure: present
        login: true
        passwordSecret:
          name: temporal-db-password

apiVersion: apps/v1
kind: Deployment
metadata:
  name: element-web
  namespace: matrix
  labels:
    app.kubernetes.io/name: element-web
    app.kubernetes.io/instance: element-web
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: element-web
      app.kubernetes.io/instance: element-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: element-web
        app.kubernetes.io/instance: element-web
    spec:
      containers:
        - name: element-web
          image: vectorim/element-web:latest
          command:
            - /bin/sh
            - -c
            - |
              cat > /etc/nginx/conf.d/default.conf << 'EOF'
              server {
                  listen 80;
                  server_name element.chat.2143.me;
                  root /app;
                  index index.html;
                  location / {
                      try_files $$uri $$uri/ /index.html;
                      add_header Cache-Control "no-cache";
                  }
              }
              EOF
              nginx -g 'daemon off;'
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: element-web

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frigate-genai-triggers
  namespace: default
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: cameras-ts-2143-https
  hostnames:
    - cameras.ts.2143.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frigate-genai-triggers
          port: 9090

apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: frigate-genai-ffmpeg
  labels: {app: frigate-genai-ffmpeg}
spec:
  workerOptions:
    connectionRef: {name: frigate-genai-temporal}
    temporalNamespace: default
    unsafeCustomBuildID: "v96"
  rollout:
    strategy: AllAtOnce
  sunset:
    scaledownDelay: 10m
    deleteDelay: 1h
  template:
    metadata:
      labels: {app: frigate-genai-ffmpeg, app.kubernetes.io/part-of: frigate-genai}
      annotations:
        linkerd.io/inject: disabled
        config.linkerd.io/skip-outbound-ports: "7233"
    spec:
      serviceAccountName: frigate-genai
      terminationGracePeriodSeconds: 180
      tolerations:
        - {key: wifi, operator: Exists, effect: NoSchedule}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app: frigate-genai-ffmpeg}
      containers:
        - name: worker
          image: ghcr.io/john2143/frigate-genai-ffmpeg:v96
          args: ["--mode=ffmpeg"]
          envFrom:
            - secretRef: {name: frigate-genai-worker-creds}
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_ACCESS_KEY_ID}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_SECRET_ACCESS_KEY}
            - {name: TEMPORAL_ADDRESS, value: "temporal-frontend.default.svc.cluster.local:7233"}
            - {name: TEMPORAL_WORKER_BUILD_ID, value: "v96"}
            - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-ffmpeg"}
          resources:
            requests: {cpu: "500m", memory: "1Gi"}
            limits: {cpu: "2000m", memory: "4Gi"}
          volumeMounts:
            - {name: scratch, mountPath: /tmp}
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: scratch
          emptyDir: {sizeLimit: 2Gi}

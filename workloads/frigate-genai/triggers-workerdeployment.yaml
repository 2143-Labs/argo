apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: frigate-genai-triggers
  labels: {app: frigate-genai-triggers}
spec:
  workerOptions:
    connectionRef: {name: frigate-genai-temporal}
    temporalNamespace: default
    unsafeCustomBuildID: "v193"
  rollout:
    strategy: AllAtOnce
  sunset:
    scaledownDelay: 10m
    deleteDelay: 1h
  template:
    metadata:
      labels: {app: frigate-genai-triggers}
    spec:
      tolerations:
      - key: "wifi"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: triggers
        image: ghcr.io/john2143/frigate-genai-genai:v193
        args: ["--mode=triggers"]
        envFrom:
        - secretRef: {name: frigate-genai-worker-creds}
        env:
        - name: MQTT_HOST
          value: "mosquitto"
        - name: MQTT_PORT
          value: "1883"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_ACCESS_KEY_ID
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: FRIGATE_BASE_URL
          value: "http://arch.ts.2143.me:5000"
        - name: HTTP_HOST
          value: "0.0.0.0"
        - {name: TEMPORAL_WORKER_BUILD_ID, value: "v193"}
        - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-triggers"}
        resources:
          requests: {cpu: "100m", memory: "128Mi"}
          limits: {cpu: "250m", memory: "256Mi"}
        ports:
        - containerPort: 9090
          name: http
        readinessProbe:
          httpGet:
            path: /api/stats
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 15

apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: frigate-genai-gemini
  labels: {app: frigate-genai-gemini}
spec:
  workerOptions:
    connectionRef: {name: frigate-genai-temporal}
    temporalNamespace: default
    unsafeCustomBuildID: "v53"
  rollout:
    strategy: Progressive
    steps:
    - {rampPercentage: 10, pauseDuration: 5m}
    - {rampPercentage: 50, pauseDuration: 5m}
  sunset:
    scaledownDelay: 30m
    deleteDelay: 2h
  template:
    metadata:
      labels: {app: frigate-genai-gemini}
    spec:
      terminationGracePeriodSeconds: 180
      tolerations:
      - key: "wifi"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "pi"
        operator: "Exists"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values: [amd64]
      containers:
      - name: worker
        startupProbe:
          exec:
            command: ["python", "-c", "from temporalio.client import Client; import asyncio, os; asyncio.run(Client.connect(os.environ.get('TEMPORAL_ADDRESS','temporal-frontend.default.svc.cluster.local:7233')))"]
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        image: ghcr.io/john2143/frigate-genai-genai:v53
        args: ["--mode=genai-gemini"]
        envFrom:
        - secretRef: {name: frigate-genai-worker-creds}
        env:
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_ACCESS_KEY_ID
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_SECRET_ACCESS_KEY
        - {name: TEMPORAL_WORKER_BUILD_ID, value: "v53"}
        - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-gemini"}
        resources:
          requests: {cpu: "250m", memory: "512Mi"}
          limits: {cpu: "1000m", memory: "2Gi"}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels: {app: frigate-genai-gemini}

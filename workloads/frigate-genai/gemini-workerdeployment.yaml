apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: frigate-genai-gemini
  labels: {app: frigate-genai-gemini}
spec:
  workerOptions:
    connectionRef: {name: frigate-genai-temporal}
    temporalNamespace: default
    unsafeCustomBuildID: "v76"
  rollout:
    strategy: Progressive
    steps:
    - {rampPercentage: 10, pauseDuration: 5m}
    - {rampPercentage: 50, pauseDuration: 5m}
  sunset:
    scaledownDelay: 30m
    deleteDelay: 2h
  template:
    metadata:
      labels: {app: frigate-genai-gemini}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 180
      tolerations:
      - key: "wifi"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "pi"
        operator: "Exists"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values: [amd64]
      containers:
      - name: worker
        image: ghcr.io/john2143/frigate-genai-genai:v76
        args: ["--mode=genai-gemini"]
        envFrom:
        - secretRef: {name: frigate-genai-worker-creds}
        env:
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_ACCESS_KEY_ID
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: TEMPORAL_ADDRESS
          value: "192.168.5.10:32682"
        - {name: TEMPORAL_WORKER_BUILD_ID, value: "v76"}
        - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-gemini"}
        resources:
          requests: {cpu: "250m", memory: "512Mi"}
          limits: {cpu: "1000m", memory: "2Gi"}
        ports:
        - containerPort: 8080
          name: http
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 30
          failureThreshold: 3
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels: {app: frigate-genai-gemini}

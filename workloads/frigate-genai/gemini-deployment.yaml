apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate-genai-gemini
  labels: {app: frigate-genai-gemini}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: frigate-genai-gemini}
  template:
    metadata:
      labels: {app: frigate-genai-gemini, app.kubernetes.io/part-of: frigate-genai}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: frigate-genai
      terminationGracePeriodSeconds: 180
      tolerations:
        - {key: wifi, operator: Exists, effect: NoSchedule}
        - {key: pi, operator: Exists, effect: NoSchedule}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/arch, operator: In, values: [amd64]}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app: frigate-genai-gemini}
      containers:
        - name: worker
          image: ghcr.io/john2143/frigate-genai-genai:v86
          args: ["--mode=genai-gemini"]
          envFrom:
            - secretRef: {name: frigate-genai-worker-creds}
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_ACCESS_KEY_ID}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_SECRET_ACCESS_KEY}
            - {name: TEMPORAL_ADDRESS, value: "temporal-grpc.john2143.com:7233"}
            - {name: TEMPORAL_WORKER_BUILD_ID, value: "v86"}
            - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-gemini"}
            - {name: TEMPORAL_TLS, value: "true"}
            - {name: TEMPORAL_TLS_SERVER_NAME, value: "temporal-grpc.john2143.com"}
            - {name: SPIFFE_ENDPOINT_SOCKET, value: "unix:///spiffe-workload-api/spire-agent.sock"}
            - {name: TEMPORAL_TLS_CA_PATH, value: "/etc/temporal-certs/ca.crt"}
          resources:
            requests: {cpu: "250m", memory: "512Mi"}
            limits: {cpu: "1000m", memory: "2Gi"}
          volumeMounts:
            - {name: spiffe-workload-api, mountPath: /spiffe-workload-api, readOnly: true}
            - {name: temporal-certs, mountPath: /etc/temporal-certs, readOnly: true}
          ports:
            - {containerPort: 8080, name: http}
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: spiffe-workload-api
          csi: {driver: csi.spiffe.io, readOnly: true}
        - name: temporal-certs
          secret: {secretName: temporal-grpc-ca-tls, defaultMode: 0444}

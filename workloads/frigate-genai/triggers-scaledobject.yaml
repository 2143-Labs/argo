apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: frigate-genai-triggers
spec:
  scaleTargetRef: {name: frigate-genai-triggers}
  minReplicaCount: 1
  cooldownPeriod: 300
  triggers:
  - type: cron
    metadata:
      timezone: America/New_York
      start: 0 0 * * *
      end: 59 23 * * *
      desiredReplicas: "1"
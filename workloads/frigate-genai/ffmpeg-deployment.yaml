apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate-genai-ffmpeg
  labels: {app: frigate-genai-ffmpeg}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: frigate-genai-ffmpeg}
  template:
    metadata:
      labels: {app: frigate-genai-ffmpeg, app.kubernetes.io/part-of: frigate-genai}
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-outbound-ports: "7233"
    spec:
      serviceAccountName: frigate-genai
      terminationGracePeriodSeconds: 180
      tolerations:
        - {key: wifi, operator: Exists, effect: NoSchedule}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app: frigate-genai-ffmpeg}
      containers:
        - name: worker
          image: ghcr.io/john2143/frigate-genai-ffmpeg:v86
          args: ["--mode=ffmpeg"]
          envFrom:
            - secretRef: {name: frigate-genai-worker-creds}
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_ACCESS_KEY_ID}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_SECRET_ACCESS_KEY}
            - {name: TEMPORAL_ADDRESS, value: "temporal-frontend.default.svc.cluster.local:7233"}
            - {name: TEMPORAL_TLS, value: "true"}
            - {name: TEMPORAL_TLS_CA, value: "/etc/temporal-certs/spire-ca.crt"}
            - {name: TEMPORAL_WORKER_BUILD_ID, value: "v86"}
            - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-ffmpeg"}
          resources:
            requests: {cpu: "500m", memory: "1Gi"}
            limits: {cpu: "2000m", memory: "4Gi"}
          volumeMounts:
            - {name: scratch, mountPath: /tmp}
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: grpc-certs
          projected:
            sources:
            - secret:
                name: temporal-grpc-ca-tls
                items:
                - key: tls.crt
                  path: ca.crt
            - configMap:
                name: spire-bundle-upstream
                items:
                - key: bundle.pem
                  path: spire-ca.crt
        - name: scratch
          emptyDir: {sizeLimit: 2Gi}

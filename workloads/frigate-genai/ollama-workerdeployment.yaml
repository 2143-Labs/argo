apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: frigate-genai-ollama
  labels: {app: frigate-genai-ollama}
spec:
  workerOptions:
    connectionRef: {name: frigate-genai-temporal}
    temporalNamespace: default
    unsafeCustomBuildID: "v99"
  rollout:
    strategy: AllAtOnce
  sunset:
    scaledownDelay: 10m
    deleteDelay: 1h
  template:
    metadata:
      labels: {app: frigate-genai-ollama, app.kubernetes.io/part-of: frigate-genai}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        linkerd.io/inject: disabled
        config.linkerd.io/skip-outbound-ports: "7233"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: frigate-genai
      terminationGracePeriodSeconds: 180
      containers:
        - name: worker
          image: ghcr.io/john2143/frigate-genai-genai:v99
          args: ["--mode=genai-ollama"]
          envFrom:
            - secretRef: {name: frigate-genai-worker-creds}
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_ACCESS_KEY_ID}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: {name: frigate-genai-worker-creds, key: AWS_SECRET_ACCESS_KEY}
            - {name: TEMPORAL_ADDRESS, value: "temporal-frontend.default.svc.cluster.local:7233"}
            - {name: TEMPORAL_WORKER_BUILD_ID, value: "v99"}
            - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-ollama"}
          resources:
            requests: {cpu: "250m", memory: "512Mi"}
            limits: {cpu: "1000m", memory: "2Gi"}
          ports:
            - {containerPort: 8080, name: http}
          startupProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet: {path: /readyz, port: 8080}
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 30
            failureThreshold: 3

apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: frigate-genai-ollama
  labels: {app: frigate-genai-ollama}
spec:
  workerOptions:
    connectionRef: {name: frigate-genai-temporal}
    temporalNamespace: default
    unsafeCustomBuildID: "v53"
  rollout:
    strategy: AllAtOnce
  sunset:
    scaledownDelay: 10m
    deleteDelay: 1h
  template:
    metadata:
      labels: {app: frigate-genai-ollama}
    spec:
      terminationGracePeriodSeconds: 180
      containers:
      - name: worker
        startupProbe:
          exec:
            command: ["python", "-c", "from temporalio.client import Client; import asyncio, os; asyncio.run(Client.connect(os.environ.get('TEMPORAL_ADDRESS','temporal-frontend.default.svc.cluster.local:7233')))"]
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        image: ghcr.io/john2143/frigate-genai-genai:v53
        args: ["--mode=genai-ollama"]
        envFrom:
        - secretRef: {name: frigate-genai-worker-creds}
        env:
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_ACCESS_KEY_ID
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: frigate-genai-worker-creds
              key: AWS_SECRET_ACCESS_KEY
        - {name: TEMPORAL_WORKER_BUILD_ID, value: "v53"}
        - {name: TEMPORAL_DEPLOYMENT_NAME, value: "frigate-genai-ollama"}
        resources:
          requests: {cpu: "250m", memory: "512Mi"}
          limits: {cpu: "1000m", memory: "2Gi"}

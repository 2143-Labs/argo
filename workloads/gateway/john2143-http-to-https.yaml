# Plain HTTP hits the acme-http listener (port 8000). Without a matching HTTPRoute,
# Traefik returns 404 for hosts that only define HTTPS listeners. Redirect browsers
# and bookmarks that use http:// to https://. ACME HTTP-01 uses more specific paths
# under /.well-known/acme-challenge/ on separate HTTPRoutes from cert-manager.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: john2143-http-to-https
  namespace: default
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: acme-http
  hostnames:
    - john2143.com
    - auth.john2143.com
    - files.john2143.com
    - auth.ts.2143.me
    - home.ts.2143.me
    - files-ui.ts.2143.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301

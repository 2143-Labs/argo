apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seafile
  namespace: default
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: seafile-john2143-https
  hostnames:
    - seafile.john2143.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: seafile
          port: 80

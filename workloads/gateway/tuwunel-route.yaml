apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-heorot
  namespace: default
spec:
  hostnames:
    - chat.2143.me
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
      namespace: default
      sectionName: chat-2143-https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: heorot
          namespace: matrix
          port: 8080

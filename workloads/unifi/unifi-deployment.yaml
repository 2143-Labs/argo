apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi
  labels:
    app: unifi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi
  template:
    metadata:
      labels:
        app: unifi
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - general
      containers:
        - name: unifi
          image: lscr.io/linuxserver/unifi-network-application:10.4.57-ls136
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: MONGO_HOST
              value: localhost
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_USER
              value: unifi
            - name: MONGO_PASS
              value: f223658782e137d231073b609fac419cf9c9a2eb295044ae349ef1049f0b63f6
            - name: MONGO_DBNAME
              value: unifi
            - name: MONGO_AUTHSOURCE
              value: admin
          ports:
            - containerPort: 8443
              name: web-ui
            - containerPort: 8080
              name: inform
            - containerPort: 3478
              protocol: UDP
              name: stun
            - containerPort: 10001
              protocol: UDP
              name: discovery
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - 'curl -skL https://localhost:8443/status | jq -e ".meta.up == true"'
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'curl -skL https://localhost:8443/status | jq -e ".meta.up == true"'
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'curl -skL https://localhost:8443/status | jq -e ".meta.up == true"'
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
        - name: mongodb
          image: docker.io/mongo:7.0
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: unifi
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: f223658782e137d231073b609fac419cf9c9a2eb295044ae349ef1049f0b63f6
            - name: MONGO_INITDB_DATABASE
              value: unifi
            - name: MONGO_USER
              value: unifi
            - name: MONGO_PASS
              value: f223658782e137d231073b609fac419cf9c9a2eb295044ae349ef1049f0b63f6
            - name: MONGO_DBNAME
              value: unifi
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: unifi-data
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: unifi-mongodb-data

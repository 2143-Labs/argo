# Direct endpoint to the Immich server running on the NAS (100.64.0.14:2283).
# No proxy pod needed — traffic flows Traefik → NAS via tailnet.
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: immich
  labels:
    kubernetes.io/service-name: immich
addressType: IPv4
endpoints:
  - addresses:
      - "100.64.0.14"
    conditions:
      ready: true
ports:
  - port: 2283
    name: http

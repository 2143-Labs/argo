apiVersion: v1
kind: Service
metadata:
  name: seafile-mariadb
  namespace: default
spec:
  ports:
    - port: 3306
      name: mysql
  clusterIP: None
  selector:
    app: seafile-mariadb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seafile-mariadb
  namespace: default
spec:
  serviceName: seafile-mariadb
  replicas: 1
  selector:
    matchLabels:
      app: seafile-mariadb
  template:
    metadata:
      labels:
        app: seafile-mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.4
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: seafile-db
              key: SEAFILE_MYSQL_DB_ROOT_PASSWD
        - name: MYSQL_DATABASE
          value: "seafile_db"
        - name: MYSQL_USER
          value: "seafile"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: seafile-db
              key: SEAFILE_MYSQL_DB_PASSWORD
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: longhorn
      resources:
        requests:
          storage: 10Gi

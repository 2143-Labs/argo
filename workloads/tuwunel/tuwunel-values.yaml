image:
  repository: ghcr.io/matrix-construct/tuwunel
  tag: v1.8.0
  pullPolicy: IfNotPresent

config:
  global:
    server_name: "chat.2143.me"
    database_path: "/var/lib/tuwunel"
    allow_registration: false
    allow_federation: false
    allow_encryption: true
    allow_room_creation: true
    max_concurrent_requests: 256

    # Storage provider — SeaweedFS S3
    storage_provider:
      seaweedfs:
        s3:
          endpoint: "https://files.john2143.com"
          bucket: "tuwunel-media"
          region: "us-east-1"

    # MatrixRTC — LiveKit integration (placeholder, enable after LiveKit deployed)
    matrix_rtc:
      enabled: true
      focus: "livekit"
      livekit_server: "https://livekit.matrix.svc.cluster.local"

    turn:
      enabled: true
      uris:
        - "turn:turns.john2143.com:3478?transport=udp"
      turn_secret_file: "/etc/tuwunel/secrets/turn/turn_secret"

    # Federation whitelist — only allow federation with trusted servers
    federation:
      whitelist:
        - "*.2143.me"
    # OIDC identity provider — au.2143.me (Pocket ID)
    # Client secret file mounted from au2143me-oidc Kubernetes Secret
    identity_provider:
      - brand: "PocketID"
        client_id: "20a2823e-d15a-4cdd-a083-3ddc11b75afc"
        client_secret_file: "/etc/tuwunel/secrets/client_secret"
        issuer_url: "http://pocket-id.pocket-id.svc.cluster.local"
        callback_url: "https://chat.2143.me/_matrix/client/unstable/login/sso/callback/20a2823e-d15a-4cdd-a083-3ddc11b75afc"
        default: true
        registration: true

extraEnv:
  # S3 credentials from SeaweedFS secret
  - name: TUWUNEL_GLOBAL__STORAGE_PROVIDER__SEAWEEDFS__S3__ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-creds
        key: access_key
  - name: TUWUNEL_GLOBAL__STORAGE_PROVIDER__SEAWEEDFS__S3__SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-creds
        key: secret_key

  # OIDC identity provider — configured in config.global.identity_provider
  # Client secret is mounted as a file from au2143me-oidc secret:
  #   client_secret_file: "/etc/tuwunel/secrets/client_secret"

persistence:
  data:
    storageClass: "longhorn"
    size: "4Gi"
    accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 8008

ingress:
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "2Gi"
    cpu: "2"

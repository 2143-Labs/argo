apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tuwunel
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/magikid/modern-conduwuit-helm
    chart: conduwuit
    targetRevision: 2.1.0
    helm:
      releaseName: tuwunel
      values: |
        image:
          repository: ghcr.io/matrix-construct/tuwunel
          tag: v1.8.0
          pullPolicy: IfNotPresent
        server_name: "matrix.2143.me"
        database_path: "/var/lib/tuwunel"

        config:
          global:
            server_name: "matrix.2143.me"
            database_path: "/var/lib/tuwunel"
            allow_registration: false
            allow_federation: false
            allow_encryption: true
            allow_room_creation: true
            max_concurrent_requests: 256

            storage_provider:
              seaweedfs:
                s3:
                  endpoint: "https://files.john2143.com"
                  bucket: "tuwunel-media"
                  region: "us-east-1"

            matrix_rtc:
              enabled: true
              focus: "livekit"
              livekit_server: "https://livekit.matrix.svc.cluster.local"

            turn:
              enabled: true
              uris:
                - "turn:turn.matrix.svc.cluster.local:3478?transport=udp"
                - "turns:turn.matrix.svc.cluster.local:5349?transport=tcp"
              secret: "CHANGE_ME_COTURN_SECRET"

            federation:
              whitelist:
                - "*.2143.me"
            well_known:
              client: "https://matrix.2143.me"
            identity_provider:
              - brand: "PocketID"
                client_id: "dee01da6-5f13-4f11-9626-3dfef252c385"
                client_secret_file: "/etc/tuwunel/secrets/client_secret"
                issuer_url: "https://au.2143.me"
                callback_url: "https://matrix.2143.me/_matrix/client/unstable/login/sso/callback/dee01da6-5f13-4f11-9626-3dfef252c385"
                default: true
                registration: true

        extraEnv:
          - name: TUWUNEL_GLOBAL__STORAGE_PROVIDER__SEAWEEDFS__S3__ACCESS_KEY
            value: "john"
          - name: TUWUNEL_GLOBAL__STORAGE_PROVIDER__SEAWEEDFS__S3__SECRET_KEY
            value: "*XSjJP83VxDM"

        persistence:
          data:
            storageClass: "longhorn"
            size: "4Gi"
            accessMode: ReadWriteOnce

        service:
          type: ClusterIP
          port: 8008

        ingress:
          enabled: false

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "2"
  destination:
    server: https://kubernetes.default.svc
    namespace: matrix
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/template/spec/volumes
        - /spec/template/spec/containers/0/volumeMounts

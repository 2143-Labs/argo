apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-migrate-spend-logs
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: python:3.13-alpine
        env:
        - name: DATABASE_URL
          value: "postgresql://litellm:dd2dd649e62177569c6e5239ea12d435@litellm-db-rw:5432/litellm"
        - name: AWS_ACCESS_KEY_ID
          value: "john"
        - name: AWS_SECRET_ACCESS_KEY
          value: "*XSjJP83VxDM"
        - name: S3_ENDPOINT
          value: "http://seaweedfs-s3:8333"
        - name: S3_BUCKET
          value: "litellm-spend-logs"
        command:
        - sh
        - -c
        - |
          pip install --quiet psycopg2-binary boto3
          python3 <<'PYEOF'
          import psycopg2, boto3, json, gzip, os, time
          from botocore.client import Config

          DB = os.environ["DATABASE_URL"]
          BUCKET = os.environ["S3_BUCKET"]
          BATCH = 500

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["S3_ENDPOINT"],
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4", s3={"addressing_style": "path"}),
          )

          conn = psycopg2.connect(DB)
          conn.autocommit = False

          while True:
              cur = conn.cursor()
              cur.execute("""
                  SELECT request_id, messages, response, proxy_server_request
                  FROM "LiteLLM_SpendLogs"
                  WHERE proxy_server_request IS NOT NULL
                     OR messages IS NOT NULL
                     OR response IS NOT NULL
                  LIMIT %s
              """, (BATCH,))
              rows = cur.fetchall()
              if not rows:
                  cur.close()
                  break

              updated = []
              for request_id, messages, response, proxy_req in rows:
                  payload = {
                      "messages": messages,
                      "response": response,
                      "proxy_server_request": proxy_req,
                  }
                  body = gzip.compress(json.dumps(payload, default=str).encode())
                  key = f"{request_id}.json.gz"
                  s3.put_object(Bucket=BUCKET, Key=key, Body=body, ContentEncoding="gzip", ContentType="application/json")
                  updated.append(request_id)

              cur.execute("""
                  UPDATE "LiteLLM_SpendLogs"
                  SET messages = NULL, response = NULL, proxy_server_request = NULL
                  WHERE request_id = ANY(%s)
              """, (updated,))
              conn.commit()
              cur.close()
              print(f"Migrated {len(updated)} rows, last: {updated[-1]}")

          conn.commit()
          print("Migration complete. Running VACUUM...")
          old = conn.autocommit
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('VACUUM "LiteLLM_SpendLogs"')
          cur.close()
          conn.autocommit = old
          conn.close()
          print("Done.")
          PYEOF

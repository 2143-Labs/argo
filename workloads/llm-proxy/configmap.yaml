          api_base: "https://yunwu.ai/v1"
      # Yunwu Official
      - model_name: "yunwu/official/*"
        litellm_params:
          model: "openai/*"
          api_key: "os.environ/YUNWU_OFFICIAL_API_KEY"
          api_base: "https://yunwu.ai/v1"
    
    litellm_settings:
      drop_params: true
      set_verbose: false
      cache: true
      cache_params:
        type: redis
        host: litellm-redis
        port: "6379"

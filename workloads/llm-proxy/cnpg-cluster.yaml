apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: litellm-db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  storage:
    size: 5Gi
    storageClass: longhorn-cnpg
  walStorage:
    size: 2Gi
    storageClass: longhorn-cnpg
  bootstrap:
    initdb:
      database: litellm
      owner: litellm
  managed:
    roles:
      - name: litellm
        ensure: present
        login: true
        passwordSecret:
          name: litellm-db-password
  postgresql:
    pg_hba:
      - host all all 0.0.0.0/0 scram-sha-256

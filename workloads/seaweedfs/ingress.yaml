apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-filer-ui
  namespace: default
spec:
  parentRefs:
    - name: shared-gateway
      sectionName: files-ui-ts-2143-https
  hostnames:
    - files-ui.ts.2143.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: seaweedfs-filer-www
          port: 8888

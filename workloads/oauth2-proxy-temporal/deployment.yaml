apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-temporal
  namespace: default
  labels:
    app: oauth2-proxy-temporal
spec:
  revisionHistoryLimit: 3
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: oauth2-proxy-temporal
  template:
    metadata:
      labels:
        app: oauth2-proxy-temporal
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: oauth2-proxy-temporal
                topologyKey: kubernetes.io/hostname
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
          imagePullPolicy: IfNotPresent
          args:
            - "--provider=oidc"
            - "--oidc-issuer-url=https://au.2143.me"
            - "--client-id=$(OAUTH2_PROXY_CLIENT_ID)"
            - "--client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)"
            - "--cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)"
            - "--redirect-url=https://temporal.john2143.com/oauth2/callback"
            - "--reverse-proxy=true"
            - "--http-address=0.0.0.0:4180"
            - "--upstream=http://temporal-web.default.svc.cluster.local:8080"
            - "--email-domain=*"
            - "--cookie-domain=temporal.john2143.com"
            - "--cookie-secure=true"
            - "--cookie-httponly=true"
            - "--cookie-samesite=lax"
            - "--cookie-expire=8h"
            - "--cookie-refresh=1h"
            - "--cookie-csrf-expire=5m"
            - "--force-code-challenge-method=S256"
            - "--proxy-websockets=true"
            - "--set-xauthrequest=true"
            - "--set-authorization-header=true"
            - "--pass-access-token=false"
            - "--pass-authorization-header=false"
            - "--standard-logging=true"
            - "--auth-logging=true"
            - "--request-logging=true"
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-temporal
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-temporal
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-temporal
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

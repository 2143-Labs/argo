apiVersion: v1
kind: Service
metadata:
  name: unifi-next
  labels:
    app: unifi-next
spec:
  type: ClusterIP
  selector:
    app: unifi-next
  ports:
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: web-ui
    - port: 3478
      targetPort: 3478
      protocol: UDP
      name: stun
    - port: 10001
      targetPort: 10001
      protocol: UDP
      name: discovery
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-next-inform
  labels:
    app: unifi-next
spec:
  type: ClusterIP
  selector:
    app: unifi-next
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: inform

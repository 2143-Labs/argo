apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-next-mongodb
  labels:
    app: unifi-next-mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-next-mongodb
  template:
    metadata:
      labels:
        app: unifi-next-mongodb
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - general
      containers:
        - name: mongodb
          image: docker.io/mongo:7.0
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: unifi-next-mongodb-root-credentials
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unifi-next-mongodb-root-credentials
                  key: password
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: unifi-next-mongodb-credentials
                  key: username
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-next-mongodb-credentials
                  key: password
            - name: MONGO_DBNAME
              value: unifi_next
            - name: MONGO_AUTHSOURCE
              value: admin
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init-mongo.sh
              subPath: init-mongo.sh
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: unifi-next-mongodb-data-lh
        - name: init-script
          configMap:
            name: unifi-next-mongo-init
            defaultMode: 0755

---
apiVersion: v1
kind: Service
metadata:
  name: temporal-homelab
  namespace: default
  labels:
    mirror.linkerd.io/cluster-name: homelab
    mirror.linkerd.io/mirrored-service: "true"
  annotations:
    mirror.linkerd.io/remote-svc-fq-name: temporal-frontend.default.svc.cluster.local
    mirror.linkerd.io/remote-gateway-identity: linkerd-gateway.linkerd-multicluster.serviceaccount.identity.linkerd.cluster.local
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 7233
    protocol: TCP
    targetPort: 7233
  - name: membership
    port: 7243
    protocol: TCP
    targetPort: 7243
  sessionAffinity: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: temporal-homelab
  namespace: default
  labels:
    mirror.linkerd.io/cluster-name: homelab
    mirror.linkerd.io/mirrored-service: "true"
  annotations:
    mirror.linkerd.io/remote-svc-fq-name: temporal-frontend.default.svc.cluster.local
    mirror.linkerd.io/remote-gateway-identity: linkerd-gateway.linkerd-multicluster.serviceaccount.identity.linkerd.cluster.local
subsets:
- addresses:
  - ip: 100.64.0.2
  ports:
  - name: grpc
    port: 4143
    protocol: TCP
  - name: membership
    port: 4143
    protocol: TCP

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  parentRefs:
    - name: shared-gateway
      namespace: default
      sectionName: auth-john2143-https
    - name: shared-gateway
      namespace: default
      sectionName: auth-ts-2143-https
  hostnames:
    - auth.john2143.com
    - auth.ts.2143.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authentik-server
          port: 80

apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-blueprints
  namespace: authentik
data:
  groups.yaml: |
    version: 1
    metadata:
      name: longhorn-groups
    entries:
      - id: longhorn-admins-group
        model: authentik_core.group
        identifiers:
          name: longhorn-admins
        attrs:
          is_superuser: false

  provider-longhorn.yaml: |
    version: 1
    metadata:
      name: longhorn-proxy-provider
    entries:
      - id: longhorn-provider
        model: authentik_providers_proxy.proxyprovider
        identifiers:
          name: longhorn-proxy
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: proxy
          external_host: https://longhorn.ts.2143.me
          internal_host: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
          internal_host_ssl_validation: false
          cookie_domain: ts.2143.me
          access_token_validity: hours=24
          refresh_token_validity: days=30

      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          type: proxy
          providers:
            - !KeyOf longhorn-provider

  application-longhorn.yaml: |
    version: 1
    metadata:
      name: longhorn-application
    entries:
      - model: authentik_core.application
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-proxy]]
          policy_engine_mode: any
          meta_launch_url: https://longhorn.ts.2143.me

      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, longhorn]]
          group: !Find [authentik_core.group, [name, longhorn-admins]]
          order: 0
        attrs:
          negate: false
          enabled: true

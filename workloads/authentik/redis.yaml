apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-kube
  namespace: authentik
  labels:
    app: redis-kube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-kube
  template:
    metadata:
      labels:
        app: redis-kube
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-kube
  namespace: authentik
spec:
  selector:
    app: redis-kube
  ports:
    - port: 6379
      targetPort: 6379

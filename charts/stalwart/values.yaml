# Stalwart Mail Server — values

replicaCount: 1

image:
  repository: stalwartlabs/stalwart
  tag: "v0.16"
  pullPolicy: IfNotPresent

# Recovery admin — bootstrap credential for first sign-in.
# Set via external secret (stalwart-env) in the stalwart namespace.
# Remove recoveryAdmin from the secret after permanent account is created.
recoveryAdmin:
  enabled: false
  username: admin

# Recovery mode — starts Stalwart in bootstrap mode (web UI only) for initial config.
# Disable after first successful configuration.
recoveryMode:
  enabled: false
  port: "8080"
  logLevel: info
  livenessDelay: 120

# config.json — only the DataStore. Everything else is configured via web UI.
config:
  "@type": RocksDb
  path: /var/lib/stalwart

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: longhorn
  size: 20Gi

service:
  type: LoadBalancer
  ports:
    smtp: 25
    submission: 587
    imaps: 993

ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

podSecurityContext:
  fsGroup: 2000
  runAsUser: 2000
  runAsGroup: 2000

extraSecretEnv: {}

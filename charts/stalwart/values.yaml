# Stalwart Mail Server — values

replicaCount: 1

image:
  repository: stalwartlabs/stalwart
  tag: "v0.16"
  pullPolicy: IfNotPresent

# Recovery admin — bootstrap credential for first sign-in.
# Set via external secret (stalwart-env) in the stalwart namespace.
# Remove recoveryAdmin from the secret after permanent account is created.
recoveryAdmin:
  enabled: true
  username: admin

# config.json — only the DataStore. Everything else is configured via web UI.
config:
  "@type": RocksDb
  path: /var/lib/stalwart

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: longhorn
  size: 20Gi

service:
  type: ClusterIP
  ports:
    smtp: 25
    smtps: 465
    submission: 587
    imap: 143
    imaps: 993
    pop3: 110
    pop3s: 995
    sieve: 4190
    http: 80
    https: 443
    mgmt: 8080

ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

podSecurityContext:
  fsGroup: 2000
  runAsUser: 2000
  runAsGroup: 2000

extraSecretEnv: {}

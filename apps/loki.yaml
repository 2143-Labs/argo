apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: loki
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.28.0
    helm:
      releaseName: loki
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  period: 24h
                  prefix: index_
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: files.john2143.com
              s3ForcePathStyle: true
              insecure: false
              access_key_id: ${S3_ACCESS_KEY}
              secret_access_key: ${S3_SECRET_KEY}
      memberlist:
        join_members:
          - loki-memberlist
      extraArgs:
            - "-config.expand-env=true"
          extraEnvFrom:
            - secretRef:
                name: o11y-rustfs-buckets
          compactor:
            retention_enabled: true
            delete_request_store: s3
            working_directory: /var/loki/compactor
            retention_delete_delay: 2h
          limits_config:
            retention_period: 720h
            max_query_lookback: 720h
        write:
          replicas: 1
          persistence:
            storageClass: longhorn
            size: 20Gi
        read:
          replicas: 1
        backend:
          replicas: 1
          persistence:
            storageClass: longhorn
            size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

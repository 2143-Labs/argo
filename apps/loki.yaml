apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: loki
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.28.0
    helm:
      releaseName: loki
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  period: 24h
                  prefix: index_
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: files.john2143.com
              s3ForcePathStyle: true
              insecure: false
              access_key_id: ${S3_ACCESS_KEY}
              secret_access_key: ${S3_SECRET_KEY}
          memberlistConfig:
            join_members:
              - dns+loki-memberlist.observability.svc.cluster.local:7946
            bind_port: 7946
            abort_if_cluster_join_fails: false
          compactor:
            retention_enabled: true
            delete_request_store: s3
            working_directory: /var/loki/compactor
            retention_delete_delay: 2h
          limits_config:
            retention_period: 720h
            max_query_lookback: 720h
        memberlist:
          service:
            publishNotReadyAddresses: false
        write:
          replicas: 1
          persistence:
            storageClass: longhorn
            size: 20Gi
          extraArgs:
            - "-config.expand-env=true"
          extraEnvFrom:
            - secretRef:
                name: o11y-rustfs-buckets
        read:
          replicas: 1
          extraArgs:
            - "-config.expand-env=true"
          extraEnvFrom:
            - secretRef:
                name: o11y-rustfs-buckets
        backend:
          replicas: 1
          persistence:
            storageClass: longhorn
            size: 10Gi
          extraArgs:
            - "-config.expand-env=true"
          extraEnvFrom:
            - secretRef:
                name: o11y-rustfs-buckets
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

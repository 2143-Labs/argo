apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: temporal
    repoURL: https://go.temporal.io/helm-charts
    targetRevision: 1.5.0
    helm:
      releaseName: temporal
      values: |
        fullnameOverride: "temporal"
        server:
          podAnnotations:
            linkerd.io/inject: disabled
            config.linkerd.io/default-inbound-policy: all-authenticated
          config:
            persistence:
              defaultStore: default
              visibilityStore: visibility
              numHistoryShards: 512
              datastores:
                default:
                  sql:
                    createDatabase: false
                    manageSchema: true
                    pluginName: postgres12
                    databaseName: temporal
                    connectAddr: "temporal-db-rw:5432"
                    connectProtocol: "tcp"
                    user: temporal
                    existingSecret: temporal-db-password
                    secretKey: password
                    maxConns: 20
                    maxConnLifetime: "1h"
                visibility:
                  sql:
                    createDatabase: false
                    manageSchema: true
                    pluginName: postgres12
                    databaseName: temporal_visibility
                    connectAddr: "temporal-db-rw:5432"
                    connectProtocol: "tcp"
                    user: temporal
                    existingSecret: temporal-db-password
                    secretKey: password
                    maxConns: 20
                    maxConnLifetime: "1h"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          additionalVolumes:
            - name: grpc-certs
              projected:
                sources:
                  - secret:
                      name: temporal-grpc-server-tls
                      items:
                        - key: tls.crt
                          path: tls.crt
                        - key: tls.key
                          path: tls.key
                  - secret:
                      name: temporal-grpc-ca-tls
                      items:
                        - key: tls.crt
                          path: ca.crt
                  - configMap:
                      name: spire-bundle-upstream
                      items:
                        - key: bundle.pem
                          path: spire-ca.crt

          additionalVolumeMounts:
            - name: grpc-certs
              mountPath: /etc/temporal/certs

          frontend:
            service:
              type: NodePort
          worker:
            enabled: false


        shims:
          dockerize: false
          elasticsearchTool: false

        web:
          enabled: true
          podAnnotations:
            linkerd.io/inject: disabled
            config.linkerd.io/default-inbound-policy: all-authenticated
          additionalEnv:
            - name: TEMPORAL_TLS_ENABLED
              value: "false"
            - name: TEMPORAL_TLS_CA
              value: ""
            - name: TEMPORAL_TLS_CERT
              value: ""
            - name: TEMPORAL_TLS_KEY
              value: ""
            - name: TEMPORAL_TLS_SERVER_NAME
              value: ""
            - name: TEMPORAL_TLS_CA_PATH
              value: ""
            - name: TEMPORAL_TLS_CERT_PATH
              value: ""
            - name: TEMPORAL_TLS_KEY_PATH
              value: ""
              value: "/etc/temporal/certs/ca.crt"
              value: "/etc/temporal/certs/tls.crt"
              value: "/etc/temporal/certs/tls.key"
              value: "temporal-frontend.default.svc.cluster.local"
            - name: TEMPORAL_AUTH_ENABLED
              value: "false"
            - name: TEMPORAL_FORWARD_HEADERS
              value: "X-Auth-Request-Email,X-Auth-Request-User,X-Auth-Request-Preferred-Username"
            - name: TEMPORAL_CSRF_COOKIE_INSECURE
              value: "true"
          additionalVolumes:
            - name: grpc-certs
              projected:
                sources:
                  - secret:
                      name: temporal-grpc-ca-tls
                      items:
                        - key: tls.crt
                          path: ca.crt
                  - secret:
                      name: temporal-web-client-tls
                      items:
                        - key: tls.crt
                          path: tls.crt
                        - key: tls.key
                          path: tls.key
          additionalVolumeMounts:
            - name: grpc-certs
              mountPath: /etc/temporal/certs
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        admintools:
          enabled: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

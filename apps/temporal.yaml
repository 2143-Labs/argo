apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: temporal
    repoURL: https://go.temporal.io/helm-charts
    targetRevision: 1.5.0
    helm:
      releaseName: temporal
      values: |
        fullnameOverride: "temporal"
        server:
          config:
            tls:
              frontend:
                server:
                  certFile: /etc/temporal/certs/tls.crt
                  keyFile: /etc/temporal/certs/tls.key
                  requireClientAuth: true
                  clientCaFiles:
                    - /etc/temporal/certs/ca.crt
            persistence:
              defaultStore: default
              visibilityStore: visibility
              numHistoryShards: 512
              datastores:
                default:
                  sql:
                    createDatabase: false
                    manageSchema: true
                    pluginName: postgres12
                    databaseName: temporal
                    connectAddr: "temporal-db-rw:5432"
                    connectProtocol: "tcp"
                    user: temporal
                    existingSecret: temporal-db-password
                    secretKey: password
                    maxConns: 20
                    maxConnLifetime: "1h"
                visibility:
                  sql:
                    createDatabase: false
                    manageSchema: true
                    pluginName: postgres12
                    databaseName: temporal_visibility
                    connectAddr: "temporal-db-rw:5432"
                    connectProtocol: "tcp"
                    user: temporal
                    existingSecret: temporal-db-password
                    secretKey: password
                    maxConns: 20
                    maxConnLifetime: "1h"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          additionalVolumes:
            - name: grpc-certs
              projected:
                sources:
                  - secret:
                      name: temporal-grpc-server-tls
                      items:
                        - key: tls.crt
                          path: tls.crt
                        - key: tls.key
                          path: tls.key
                  - secret:
                      name: temporal-grpc-ca-tls
                      items:
                        - key: tls.crt
                          path: ca.crt

          additionalVolumeMounts:
            - name: grpc-certs
              mountPath: /etc/temporal/certs

          frontend:
            service:
              type: NodePort
          worker:
            enabled: false


        shims:
          dockerize: false
          elasticsearchTool: false

        web:
          enabled: true
          additionalEnv:
            - name: TEMPORAL_AUTH_ENABLED
              value: "false"
            - name: TEMPORAL_FORWARD_HEADERS
              value: "X-Auth-Request-Email,X-Auth-Request-User,X-Auth-Request-Preferred-Username"
            - name: TEMPORAL_CSRF_COOKIE_INSECURE
              value: "true"
            - name: TEMPORAL_TLS_ENABLED
              value: "true"
            - name: TEMPORAL_TLS_CA_PATH
              value: "/etc/temporal/certs/ca.crt"
            - name: TEMPORAL_TLS_SERVER_NAME
              value: "temporal-frontend"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          additionalVolumes:
            - name: grpc-certs
              projected:
                sources:
                  - secret:
                      name: temporal-grpc-ca-tls
                      items:
                        - key: tls.crt
                          path: ca.crt
          additionalVolumeMounts:
            - name: grpc-certs
              mountPath: /etc/temporal/certs

        admintools:
          enabled: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

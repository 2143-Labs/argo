apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seafile
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: ce
    repoURL: https://haiwen.github.io/seafile-helm-chart/repo
    targetRevision: 13.0.2
    helm:
      releaseName: seafile
      values: |
        # Community Edition multi-container image
        image: seafileltd/seafile-mc
        imageTag: 13.0-latest

        # Disable bundled ingress — we route via Gateway API
        ingress:
          enabled: false

        # Expose the bundled Nginx on port 80 via ClusterIP
        service:
          type: ClusterIP
          port: 80

        # Persistent storage via Longhorn
        persistence:
          enabled: true
          storageClass: longhorn
          size: 50Gi
          accessMode: ReadWriteOnce


        # First-deploy init: auto-creates DB tables and admin account.
        # Set to false AFTER first successful sync.
        initMode: false

        # Admin account — created on init
        adminEmail: admin@john2143.com
        # adminPassword comes from envFromSecrets below

        # Server URL
        serverUrl: https://seafile.john2143.com

        # Environment variables injected into seahub_settings.py
        seafile:
          env:
            SEAFILE_SERVER_HOSTNAME: "seafile.john2143.com"
            SEAFILE_MYSQL_DB_HOST: "seafile-mariadb"
            MEMCACHED_HOST: "seafile-memcached"
            INIT_SEAFILE_ADMIN_EMAIL: "admin@john2143.com"
            CACHE_PROVIDER: "memcached"
          extraVolumes:
            - name: oauth-config
              mountPath: /scripts/seafile_oauth_settings.py
              subPath: oauth_settings.py
              volumeInfo:
                configMap:
                  name: seafile-oauth-config

  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

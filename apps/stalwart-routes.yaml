apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stalwart-routes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/2143-Labs/argo.git
    targetRevision: HEAD
    path: workloads/stalwart
  destination:
    server: https://kubernetes.default.svc
    namespace: stalwart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
